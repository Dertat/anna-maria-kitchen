<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Intro Preview — Anna-Maria kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="logo-intro.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0e1420;
      font-family: Inter, sans-serif;
      color: #d4cdc0;
    }
    .preview {
      text-align: center;
      padding: 40px 20px;
    }
    .preview__stage {
      width: min(480px, 90vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      margin: 0 auto 32px;
    }
    button {
      margin-top: 16px;
      padding: 12px 24px;
      background: #f5f0e8;
      color: #1a2840;
      border: none;
      border-radius: 2px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    p { font-size: 0.85rem; opacity: 0.7; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="preview">
    <div class="preview__stage" id="logo-stage"></div>
    <button id="replay">Повторить анимацию</button>
    <p>Anna-Maria kitchen — logo intro preview (~2s)</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="logo-intro.js"></script>
  <script>
    const stage = document.getElementById('logo-stage');
    const replay = document.getElementById('replay');

    function play() {
      stage.innerHTML = '';
      initLogoIntro(stage, { autoplay: true });
    }

    replay.addEventListener('click', play);
    play();
  </script>
</body>
</html>
