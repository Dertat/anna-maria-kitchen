<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anna-Maria Logo — Lottie Preview</title>
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.4.0/dist/dotlottie-wc.js" type="module"></script>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0e1420;
      font-family: system-ui, sans-serif;
      color: #f5f0e8;
      padding: 24px;
    }
    .wrap { text-align: center; max-width: 560px; }
    h1 { font-size: 1.1rem; font-weight: 500; margin-bottom: 8px; }
    p { color: #9aa8bc; font-size: 0.9rem; line-height: 1.5; margin-bottom: 24px; }
    dotlottie-wc {
      width: min(420px, 90vw);
      height: min(420px, 90vw);
      margin-inline: auto;
      display: block;
    }
    .files {
      margin-top: 28px;
      text-align: left;
      background: #151d2b;
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    code { color: #d4c4a8; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Anna-Maria kitchen — Lottie</h1>
    <p>Появление + лёгкое покачивание. Фон прозрачный, 512×512.</p>
    <dotlottie-wc
      src="assets/anna-maria-layers.json"
      autoplay
      loop
      background="transparent">
    </dotlottie-wc>
    <div class="files">
      <strong>Для Lottie Creator:</strong><br>
      1. Откройте <a href="https://creator.lottiefiles.com/" style="color:#f5f0e8">creator.lottiefiles.com</a><br>
      2. Перетащите <code>assets/anna-maria-layers.lottie</code> или <code>anna-maria-layers.json</code><br>
      3. Слои: <code>assets/layers/</code> — круг, обводка, венчик, ложка, текст
    </div>
  </div>
</body>
</html>
