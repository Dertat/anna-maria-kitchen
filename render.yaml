services:
  - type: web
    name: anna-maria-kitchen
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Public site URL — update when adding a custom domain in Render Dashboard
      - key: VITE_SITE_URL
        value: https://anna-maria-kitchen.onrender.com
      # Google Analytics 4 measurement ID
      # - key: VITE_GA_ID
      #   value: G-D1SNVZYBNF
      # Google Ads account ID + lead conversion label (from ads.google.com)
      # - key: VITE_GOOGLE_ADS_ID
      #   value: AW-XXXXXXXXXX
      # - key: VITE_GOOGLE_ADS_LEAD_LABEL
      #   value: xxxxxxxxxx
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
