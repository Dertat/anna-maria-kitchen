services:
  - type: web
    name: anna-maria-kitchen
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Public site URL — update when adding a custom domain in Render Dashboard
      - key: VITE_SITE_URL
        value: https://annamariakitchen.rs
      # Google Analytics 4 measurement ID
      - key: VITE_GA_ID
        value: G-D1SNVZYBNF
      # Google Ads — baked into build (redeploy if tags missing on site)
      - key: VITE_GOOGLE_ADS_ID
        value: AW-18236270443
      - key: VITE_GOOGLE_ADS_LEAD_LABEL
        value: PwViCOjom8IcEOvO3fdD
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
